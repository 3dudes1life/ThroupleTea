<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>A Little Throuple Tea — Links</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#072129" />
  <meta name="description" content="All the links for A Little Throuple Tea — Tea Hotline, website, listen, watch, and more." />

  <!-- Open Graph -->
  <meta property="og:title" content="A Little Throuple Tea — Links" />
  <meta property="og:description" content="Tea Hotline on top, then listen, watch, and subscribe." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="images/og-cover.jpg" />
  <meta property="og:url" content="https://throupletea.com/links" />
  <meta property="og:site_name" content="A Little Throuple Tea" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="A Little Throuple Tea — Links" />
  <meta name="twitter:description" content="Tea Hotline on top, then listen, watch, and subscribe." />
  <meta name="twitter:image" content="images/og-cover.jpg" />

  <link rel="icon" href="images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    :root{
      --ink:#eaf7ff; --ink-strong:#fff; --muted:#9fd6d6;
      --bg-dark:#0e3441; --bg-deeper:#072129;
      --sun:#ff7a1a; --sun-soft:#ffc247;
      --sea:#18a5a6; --card:#0f3b46; --card-border:#155e6e;
      --shadow:0 10px 28px rgba(0,0,0,.35);
      --shadow-strong:0 16px 40px rgba(0,0,0,.5);
      --pad: clamp(16px, 6vw, 28px);
      --btn-h:56px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      color:var(--ink);
      overflow-x:hidden;
      background:
        radial-gradient(1200px 700px at 85% -10%, rgba(255,122,26,.18), transparent),
        linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-deeper) 70%);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif;
      line-height:1.6;
    }

    .wrap{max-width:640px;margin:0 auto;padding:var(--pad);position:relative;z-index:2}

    header{display:flex;justify-content:center;padding-top:18px}

    .brand{
      display:flex;
      align-items:center;
      gap:.75rem;
      text-decoration:none;
      color:var(--ink);
    }

    .brand img{
      height:56px;
      width:56px;
      border-radius:50%;
    }

    .brand h1{
      margin:0;
      font:800 clamp(1.25rem,2.5vw,1.6rem)/1 'Baloo 2';
      color:var(--ink-strong);
    }

    .tag{
      color:var(--muted);
      font-weight:700;
      margin-top:2px;
    }

    .group-title{
      margin:22px 0 8px;
      color:var(--sun-soft);
      font:800 1.1rem 'Baloo 2';
    }

    .stack{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .btn{
      display:flex;
      align-items:center;
      gap:12px;
      min-height:var(--btn-h);
      padding:14px 16px;
      border-radius:999px;
      border:1px solid var(--card-border);
      background:var(--card);
      color:var(--ink);
      text-decoration:none;
      font-weight:900;
      letter-spacing:.2px;
      box-shadow:var(--shadow);
      transition:all .15s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
      border-color:var(--sun);
      box-shadow:var(--shadow-strong);
    }

    .btn.primary{
      background:linear-gradient(180deg,var(--sun) 0%,#ff983d 100%);
      color:#1b0d04;
      border-color:transparent;
      animation:pulse 2s infinite;
    }

    .btn .icon{
      width:28px;
      height:28px;
      display:grid;
      place-items:center;
    }

    .btn .icon img{
      max-width:100%;
      max-height:100%;
    }

    footer{
      color:var(--muted);
      text-align:center;
      padding:22px 0;
    }

    @keyframes pulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.02)}
    }

    /* FALLING CHAOS */
    .drop{
      position:fixed;
      top:-40px;
      font-size:30px;
      pointer-events:none;
      z-index:1;
      animation:fall linear forwards;
      opacity:.95;
    }

    @keyframes fall{
      0%{
        transform:translateY(-40px) rotate(0deg);
        opacity:0;
      }
      10%{opacity:1;}
      100%{
        transform:translateY(110vh) rotate(540deg);
        opacity:0;
      }
    }

  </style>
</head>

<body>

<main class="wrap">

<header>
  <a class="brand" href="/">
    <img src="images/logo.png" alt="A Little Throuple Tea logo" />
    <div>
      <h1>A Little Throuple Tea</h1>
      <div class="tag">Official Links</div>
    </div>
  </a>
</header>

<!-- Tea Hotline -->
<div class="stack">
  <a class="btn primary" href="mailto:throupletea@gmail.com?subject=Tea%20Hotline">
    <span class="icon">☕</span>
    Tea Hotline — Drop Your Drama
  </a>
</div>

<!-- Website -->
<div class="stack">
  <a class="btn" href="https://throupletea.com" target="_blank">
    <span class="icon">🌐</span>
    Visit the Website
  </a>
</div>

<!-- Listen -->
<div class="group-title">Listen</div>
<div class="stack">
  <a class="btn" href="https://open.spotify.com/show/6cb9Y7qcyDO1L7O15X2oL5" target="_blank"><span class="icon">🎧</span>Spotify</a>
  <a class="btn" href="https://www.youtube.com/channel/UCswzye8bcm8bByqLlW0QaFQ" target="_blank"><span class="icon">📺</span>YouTube</a>
  <a class="btn" href="https://podcasts.apple.com/us/podcast/3dudes1life-a-little-throuple-tea/id1837237399" target="_blank"><span class="icon">🍎</span>Apple Podcasts</a>
</div>

<!-- Guest -->
<div class="group-title">Join the Show!</div>
<div class="stack">
  <a class="btn" href="https://throupletea.com/guest/" target="_blank">
    <span class="icon">🔥</span>
    Apply to be a Guest
  </a>
</div>

<footer>
  © <span id="year"></span> A Little Throuple Tea
</footer>

</main>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

/* DROP CONFETTI + MARGS + LIMES */
const emojis = ["🎉","✨","🍹","🍸","🍋","🍈","🧂"];

function dropParty() {
  for(let i=0;i<28;i++){
    const item = document.createElement("div");
    item.className = "drop";
    item.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    item.style.left = Math.random()*100 + "vw";
    item.style.animationDuration = (3 + Math.random()*3) + "s";
    item.style.fontSize = (24 + Math.random()*18) + "px";
    document.body.appendChild(item);

    setTimeout(() => item.remove(), 6500);
  }
}

window.addEventListener("load", () => {
  setTimeout(dropParty, 350);
});
</script>

</body>
</html>
